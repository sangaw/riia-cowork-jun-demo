name: Build and Deploy to K3s

on:
  push:
    branches:
      - main
      # Trigger deployment when pushing to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Push image to GHCR instead of AWS ECR to save money
          tags: ghcr.io/${{ github.repository }}/rita:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          # SSH key generated by Terraform and stored in your Github Secrets
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to K3s via remote SSH
        # NOTE: AWS_EC2_IP is the output of the terraform module
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_EC2_IP }} << 'EOF'
            set -e
            
            # Export Variables for Secret templating
            export RITA_JWT_SECRET=${{ secrets.RITA_JWT_SECRET }}
            export GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            export GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            
            # Use envsubst to safely insert secrets into the YAML files
            # Note: in a real CD workflow, you can copy the k8s folder to the server and apply it:
            # kubectl apply -f k8s/
            
            # Force restart the deployment to pull the latest ghcr image
            sudo k3s kubectl rollout restart deployment rita-api -n default
          EOF
