app:
  name: "rita"
  version: "1.0.0"

server:
  host: "0.0.0.0"
  port: 8000

data:
  raw_dir: "data/raw"        # Source CSVs as downloaded — read-only
  input_dir: "data/input"    # Processed/merged CSVs ready for model
  output_dir: "data/output"  # Backtest results, risk timeline, trade events

model:
  path: "models"             # Trained model ZIPs; instrument subfolder added at runtime

# Financial constants — config-driven, never hardcoded in application code
instruments:
  nifty:
    lot_size: 75        # changed from 50 in 2024
  banknifty:
    lot_size: 30
